<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Abstract wellness and relationship coaching visual</title>
  <desc id="desc">Lavender, emerald, and gold abstract forms suggesting balance, growth, and connection.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbf8ff"/>
      <stop offset=".52" stop-color="#f3ecff"/>
      <stop offset="1" stop-color="#fff9ec"/>
    </linearGradient>
    <radialGradient id="glow" cx="42%" cy="38%" r="58%">
