      <stop offset="1" stop-color="#3baa84"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e9c66a"/>
      <stop offset=".5" stop-color="#c59b35"/>
      <stop offset="1" stop-color="#fff1ad"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
